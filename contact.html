<!DOCTYPE html>
<html>
<head>
    <title>Contact Abdelatif</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1a73e8;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }
        button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            margin-top: 20px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0d5bbf;
        }
        .note {
            font-size: 12px;
            color: gray;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
       <div style="margin-bottom: 30px;">
            <a href="day1.html" style="margin-right: 15px; text-decoration: none; color: #1a73e8;">🏠 Home</a>
            <a href="progress.html" style="margin-right: 15px; text-decoration: none; color: #1a73e8;">📈 Progress</a>
            <a href="projects.html" style="margin-right: 15px; text-decoration: none; color: #1a73e8;">🚀 Projects</a>
            <a href="contact.html" style="text-decoration: none; color: #1a73e8;">✉️ Contact</a>
        </div>

        <h1>✉️ Contact Me</h1>
        <p>Have a question or opportunity? Send me a message.</p>

        <form>
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Your email address" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="What would you like to say?" required></textarea>

            <button type="submit">Send Message</button>
        </form>

        <div class="note">
            ⚡ The form doesn't send email yet – that's coming on a future day.
        </div>
    </div>
</body>
</html>
