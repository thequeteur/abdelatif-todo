<!DOCTYPE html>
<html>
<head>
    <title>Pricing - Abdelatif's To-Do List</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .pricing-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .pricing-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            flex: 1;
            min-width: 250px;
        }
        .pricing-card.premium {
            border: 2px solid #1a73e8;
            background: #f0f7ff;
        }
        .price {
            font-size: 36px;
            font-weight: bold;
            color: #1a73e8;
            margin: 20px 0;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 20px;
            border: none;
            cursor: pointer;
        }
        .btn-primary { background: #1a73e8; color: white; }
        #statusMsg {
            margin-top: 20px;
            padding: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>💰 Pricing</h1>
        
        <div class="pricing-container">
            <div class="pricing-card">
                <h2>Free</h2>
                <div class="price">$0</div>
                <p>Basic features, 10 tasks</p>
                <p>✅ Categories</p>
                <p>✅ Due dates</p>
                <p>❌ Unlimited tasks</p>
            </div>
            
            <div class="pricing-card premium">
                <h2>Premium</h2>
                <div class="price">$5<span style="font-size:14px;">/month</span></div>
                <p>Unlimited everything</p>
                <p>✅ Unlimited tasks</p>
                <p>✅ Premium support</p>
                <p>✅ Export data</p>
                <button class="btn btn-primary" id="upgradeBtn">Upgrade Now</button>
            </div>
        </div>
        
        <div id="statusMsg"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                document.getElementById('statusMsg').innerHTML = 
                    'Please <a href="index.html">log in</a> to upgrade';
                document.getElementById('statusMsg').style.display = 'block';
                document.getElementById('upgradeBtn').disabled = true;
            }
            return user;
        }

        document.getElementById('upgradeBtn').addEventListener('click', async () => {
            const user = await checkUser();
            if (!user) return;

            const upgradeBtn = document.getElementById('upgradeBtn');
            upgradeBtn.disabled = true;
            upgradeBtn.textContent = 'Processing...';

            try {
                const response = await fetch('https://totnnocgfjhrlofgbjdr.supabase.co/functions/v1/create-checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: user.id,
                        email: user.email,
                        priceId: 'price_1TgL0SRu8RgSD6da4snS1ooB', // YOUR STRIPE PRICE ID HERE
                        successUrl: window.location.origin + '/pricing.html?success=true',
                        cancelUrl: window.location.origin + '/pricing.html?canceled=true'
                    })
                });

                const { url, error } = await response.json();
                if (error) throw new Error(error);
                if (url) window.location.href = url;
            } catch (error) {
                alert('Error: ' + error.message);
                upgradeBtn.disabled = false;
                upgradeBtn.textContent = 'Upgrade Now';
            }
        });

        checkUser();
        
        if (window.location.search.includes('success=true')) {
            document.getElementById('statusMsg').innerHTML = 
                '✅ Payment successful! Your account has been upgraded.';
            document.getElementById('statusMsg').style.cssText = 'background:#e8f5e9; color:#2e7d32; display:block;';
        } else if (window.location.search.includes('canceled=true')) {
            document.getElementById('statusMsg').innerHTML = 
                'Payment cancelled. No charges were made.';
            document.getElementById('statusMsg').style.cssText = 'background:#fff3e0; color:#e65100; display:block;';
        }
    </script>
</body>
</html>
