<!DOCTYPE html>
<html>
<head>
    <title>Abdelatif's To-Do List</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 700px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 { color: #1a73e8; text-align: center; }
        .nav-links {
            text-align: center;
            margin-bottom: 30px;
        }
        .nav-links a {
            margin: 0 10px;
            text-decoration: none;
            color: #1a73e8;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            cursor: pointer;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
        }
        .auth-section {
            background: #f0f7ff;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .todo-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            display: none;
        }
        .task-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .task-info {
            flex: 1;
        }
        .task-text {
            cursor: pointer;
            font-size: 16px;
        }
        .task-text.completed {
            text-decoration: line-through;
            color: gray;
        }
        .task-meta {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .task-category {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-right: 10px;
        }
        .category-work { background: #e3f2fd; color: #1565c0; }
        .category-personal { background: #e8f5e9; color: #2e7d32; }
        .category-shopping { background: #fff3e0; color: #e65100; }
        .task-overdue { color: #c62828; font-weight: bold; }
        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .input-group input, .input-group select {
            margin: 0;
            flex: 1;
        }
        .date {
            text-align: center;
            font-size: 12px;
            color: gray;
            margin-top: 30px;
        }
        .message {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        .message.error { background: #ffebee; color: #c62828; }
        .message.success { background: #e8f5e9; color: #2e7d32; }
        .task-buttons {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="nav-links">
            <a href="index.html">🏠 Home</a>
            <a href="progress.html">📈 Progress</a>
            <a href="projects.html">🚀 Projects</a>
            <a href="contact.html">✉️ Contact</a>
            <a href="pricing.html">💰 Pricing</a>
        </div>

        <h1>✅ Pro To-Do List</h1>

        <div id="message" class="message"></div>

        <!-- Login/Signup Section -->
        <div id="authSection" class="auth-section">
            <h3>🔐 Login or Create Account</h3>
            <input type="email" id="email" placeholder="Email address">
            <input type="password" id="password" placeholder="Password">
            <button class="btn-success" id="signupBtn">Create Account</button>
            <button class="btn-primary" id="loginBtn">Login</button>
        </div>

        <!-- To-Do List Section (hidden until login) -->
        <div id="todoSection" class="todo-section">
            <h3>📝 My Tasks</h3>
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Task description...">
                <select id="categorySelect">
                    <option value="Personal">👤 Personal</option>
                    <option value="Work">💼 Work</option>
                    <option value="Shopping">🛒 Shopping</option>
                </select>
                <input type="date" id="dueDateInput">
                <button class="btn-primary" id="addTaskBtn">Add Task</button>
            </div>
            <div id="taskList"></div>
            <button class="btn-danger" id="logoutBtn" style="margin-top: 15px; width: 100%;">Logout</button>
        </div>

        <div class="date">
            Day 13 - Categories & Due Dates | Premium Features
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ===== YOUR SUPABASE CREDENTIALS (REPLACE WITH YOURS) =====
        const SUPABASE_URL = 'https://totnnocgfjhrlofgbjdr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdG5ub2NnZmpocmxvZmdiamRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2OTQ0MTUsImV4cCI6MjA5NjI3MDQxNX0.XAx-5LlSQsg_hxb4JqDzk5iLNMOW-FziSegWJhCsYis'; // Your anon key starting with eyJ
        
        let supabaseClient = null;
        if (typeof supabase !== 'undefined') {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }
        
        let currentUser = null;
        let tasks = [];

        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }

        function showTodoSection(show) {
            const todoSection = document.getElementById('todoSection');
            const authSection = document.getElementById('authSection');
            if (show) {
                todoSection.style.display = 'block';
                authSection.style.display = 'none';
            } else {
                todoSection.style.display = 'none';
                authSection.style.display = 'block';
            }
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleDateString();
        }

        function isOverdue(dueDate) {
            if (!dueDate) return false;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const due = new Date(dueDate);
            return due < today;
        }

        function getCategoryClass(category) {
            switch(category) {
                case 'Work': return 'category-work';
                case 'Shopping': return 'category-shopping';
                default: return 'category-personal';
            }
        }

        async function loadTasks() {
            if (!currentUser || !supabaseClient) return;
            
            const { data, error } = await supabaseClient
                .from('tasks')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('due_date', { ascending: true });
            
            if (error) {
                console.error('Error loading tasks:', error);
                showMessage('Could not load tasks: ' + error.message, 'error');
            } else {
                tasks = data || [];
                displayTasks();
            }
        }

        function displayTasks() {
            const taskListDiv = document.getElementById('taskList');
            if (!taskListDiv) return;
            
            if (tasks.length === 0) {
                taskListDiv.innerHTML = '<p style="color: gray; text-align: center;">✨ No tasks yet. Add one above!</p>';
                return;
            }
            
            let html = '';
            for (const task of tasks) {
                const overdue = isOverdue(task.due_date);
                const categoryClass = getCategoryClass(task.category);
                const dueDateHtml = task.due_date ? 
                    `<span class="task-meta">📅 Due: ${formatDate(task.due_date)} ${overdue ? '<span class="task-overdue">(Overdue!)</span>' : ''}</span>` : 
                    '<span class="task-meta">📅 No due date</span>';
                
                html += `
                    <div class="task-item">
                        <div class="task-info">
                            <div class="task-text ${task.completed ? 'completed' : ''}" data-id="${task.id}" data-completed="${task.completed}">
                                ${task.completed ? '✅' : '⬜'} ${escapeHtml(task.text)}
                            </div>
                            <div class="task-meta">
                                <span class="task-category ${categoryClass}">${escapeHtml(task.category || 'Personal')}</span>
                                ${dueDateHtml}
                            </div>
                        </div>
                        <div class="task-buttons">
                            <button class="delete-btn" data-id="${task.id}">Delete</button>
                        </div>
                    </div>
                `;
            }
            taskListDiv.innerHTML = html;
            
            // Add event listeners
            document.querySelectorAll('.task-text').forEach(el => {
                el.addEventListener('click', () => toggleTask(el.dataset.id, el.dataset.completed === 'true'));
            });
            document.querySelectorAll('.delete-btn').forEach(el => {
                el.addEventListener('click', () => deleteTask(el.dataset.id));
            });
        }

        async function addTask() {
            const text = document.getElementById('taskInput').value.trim();
            const category = document.getElementById('categorySelect').value;
            const dueDate = document.getElementById('dueDateInput').value || null;
            
            if (!text) {
                showMessage('Please enter a task', 'error');
                return;
            }

            if (!(await canAddTask())) return;
            
            const { data, error } = await supabaseClient
                .from('tasks')
                .insert([{ 
                    text: text, 
                    completed: false, 
                    category: category,
                    due_date: dueDate,
                    user_id: currentUser.id 
                }])
                .select();
            
            if (error) {
                console.error('Error adding task:', error);
                showMessage('Failed to add task: ' + error.message, 'error');
            } else if (data) {
                tasks.push(data[0]);
                displayTasks();
                document.getElementById('taskInput').value = '';
                document.getElementById('dueDateInput').value = '';
                showMessage('Task added!', 'success');
            }
        }

        async function canAddTask() {
                if (!currentUser) return false;
                
                // Check if user is premium (you'll set this after Stripe webhook)
                const { data, error } = await supabase
                    .from('profiles')
                    .select('is_premium')
                    .eq('id', currentUser.id)
                    .single();
                
                if (error) {
                    console.error('Error checking premium status:', error);
                    return false;
                }
                
                const isPremium = data?.is_premium || false;
                
                if (!isPremium && tasks.length >= 10) {
                    showMessage('Free users can only have 10 tasks. Upgrade to Premium for unlimited tasks!', 'error');
                    return false;
                }
                return true;
        }

        async function deleteTask(taskId) {
            const { error } = await supabaseClient
                .from('tasks')
                .delete()
                .eq('id', taskId);
            
            if (error) {
                console.error('Error deleting task:', error);
                showMessage('Failed to delete task', 'error');
            } else {
                tasks = tasks.filter(task => task.id !== taskId);
                displayTasks();
                showMessage('Task deleted', 'success');
            }
        }

        async function toggleTask(taskId, currentStatus) {
            const { error } = await supabaseClient
                .from('tasks')
                .update({ completed: !currentStatus })
                .eq('id', taskId);
            
            if (error) {
                console.error('Error toggling task:', error);
                showMessage('Failed to update task', 'error');
            } else {
                const task = tasks.find(t => t.id === taskId);
                if (task) task.completed = !currentStatus;
                displayTasks();
            }
        }

        async function signup() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showMessage('Please enter both email and password', 'error');
                return;
            }
            
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) {
                console.error('Signup error:', error);
                showMessage('Signup failed: ' + error.message, 'error');
            } else {
                showMessage('Account created! Please login.', 'success');
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showMessage('Please enter both email and password', 'error');
                return;
            }
            
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                console.error('Login error:', error);
                showMessage('Login failed: ' + error.message, 'error');
            } else {
                currentUser = data.user;
                showTodoSection(true);
                await loadTasks();
                showMessage('Welcome back, ' + currentUser.email + '!', 'success');
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            currentUser = null;
            tasks = [];
            displayTasks();
            showTodoSection(false);
            showMessage('Logged out successfully', 'success');
        }

        async function checkUser() {
            if (!supabaseClient) return;
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                currentUser = user;
                showTodoSection(true);
                await loadTasks();
            } else {
                showTodoSection(false);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Set up event listeners
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('signupBtn').addEventListener('click', signup);
            document.getElementById('loginBtn').addEventListener('click', login);
            document.getElementById('addTaskBtn').addEventListener('click', addTask);
            document.getElementById('logoutBtn').addEventListener('click', logout);
            checkUser();
        });
    </script>
</body>
</html>
